# ==========================================
# SERVER CONFIGURATION
# ==========================================
# Render will automatically inject a port here, but it defaults to 8080 locally.
server.port=${PORT:8080}

# ==========================================
# DATABASE CONFIGURATION (MySQL)
# ==========================================
# The syntax ${ENV_VAR:fallback_value} is magic. 
# On Render, it uses the ENV_VAR. On your laptop, it uses the fallback value.

spring.datasource.url=${DB_URL:jdbc:mysql://localhost:3306/contacts_db}
spring.datasource.username=${DB_USERNAME:root}
spring.datasource.password=${DB_PASSWORD:root}

# ==========================================
# HIBERNATE & JPA SETTINGS
# ==========================================
# Automatically create or update the database tables to match your Java Entities
spring.jpa.hibernate.ddl-auto=update

# Explicitly tell Spring Boot to speak MySQL
spring.jpa.database-platform=org.hibernate.dialect.MySQLDialect

# Show SQL queries in the terminal (helpful for debugging, you can set to false later)
spring.jpa.show-sql=true

# ==========================================
# SECURITY / JWT (If you have custom properties)
# ==========================================
# If you created custom properties for your JWT secret, protect them the same way!
# jwt.secret=${JWT_SECRET:my_local_development_secret_key}